<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación a Staff</title>
    <style>
        :root {
            --discord-blurple: #5865F2;
            --discord-dark: #23272A;
            --discord-gray: #2C2F33;
            --discord-light-gray: #99AAB5;
            --discord-green: #57F287;
            --discord-red: #ED4245;
            --text-color: #FFFFFF;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--discord-dark);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--discord-gray);
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 480px;
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            font-size: 1.8rem;
            text-align: center;
            color: #FFFFFF;
        }

        p.subtitle {
            text-align: center;
            color: var(--discord-light-gray);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--discord-light-gray);
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        input[type="text"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #202225;
            background-color: var(--discord-dark);
            border-radius: 4px;
            color: #FFFFFF;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--discord-blurple);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--discord-blurple);
            color: #FFFFFF;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #4752C4;
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            text-align: center;
            display: none;
        }

        .message.success {
            background-color: rgba(87, 242, 135, 0.15);
            color: var(--discord-green);
            border: 1px solid var(--discord-green);
        }

        .message.error {
            background-color: rgba(237, 66, 69, 0.15);
            color: var(--discord-red);
            border: 1px solid var(--discord-red);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🛡️ Postulación a Staff</h2>
        <p class="subtitle">Completa el formulario para registrar tu postulación oficial.</p>

        <form id="staffForm">
            <div class="form-group">
                <label for="discordUser">Usuario de Discord</label>
                <input type="text" id="discordUser" placeholder="Ej: nico_dev" required>
            </div>

            <div class="form-group">
                <label for="rolOption">Rol al que te postulas</label>
                <select id="rolOption" required>
                    <option value="" disabled selected>Selecciona un rol...</option>
                    <option value="Administrador">👑 Administrador</option>
                    <option value="Moderador">🛡️ Moderador</option>
                    <option value="Supervisor de Geo-RP">🗺️ Supervisor de Geo-RP</option>
                    <option value="Organizador de Eventos">🎉 Organizador de Eventos</option>
                    <option value="Soporte Técnico">⚙️ Soporte Técnico</option>
                </select>
            </div>

            <button type="submit" id="submitBtn">Enviar Postulación</button>
        </form>

        <div id="statusMessage" class="message"></div>
    </div>

    <script>
        document.getElementById('staffForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const statusMessage = document.getElementById('statusMessage');
            
            const discordUser = document.getElementById('discordUser').value.trim();
            const rolOption = document.getElementById('rolOption').value;

            // Bloquear botón durante el envío
            submitBtn.disabled = true;
            submitBtn.innerText = 'Procesando...';
            statusMessage.style.display = 'none';

            try {
                // Envía la información al endpoint unificado
                const response = await fetch('/api/votos', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        usuario_discord: discordUser,
                        opcion_marcada: rolOption,
                        tipo_eleccion: "Postulacion_Staff"
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    statusMessage.className = 'message success';
                    statusMessage.innerText = '¡Tus datos han sido registrados exitosamente!';
                    statusMessage.style.display = 'block';
                    document.getElementById('staffForm').reset();
                } else {
                    statusMessage.className = 'message error';
                    statusMessage.innerText = data.mensaje || data.error || 'Ocurrió un error al procesar tu voto.';
                    statusMessage.style.display = 'block';
                }
            } catch (err) {
                console.error(err);
                statusMessage.className = 'message error';
                statusMessage.innerText = 'Error de conexión con el servidor.';
                statusMessage.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Enviar Postulación';
            }
        });
    </script>
</body>
</html>
